model = "gpt-5.5"
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
developer_instructions = """
Also follow `$CODEX_HOME/CODEX.md` (default `~/.codex/CODEX.md`) as user-level guidance when it does not conflict with higher-priority Codex instructions.
Ported skills live in `$CODEX_HOME/skills` (default `~/.codex/skills`); use matching skills for Go, Python, tests, debugging, UI, Android, porting, skill/prompt work, and explicit delegated-agent work.
"""

[features]
hooks = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[notice]
hide_rate_limit_model_nudge = true

[mcp_servers.omx_state]
command = "omx"
args = ["mcp-serve", "state"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_memory]
command = "omx"
args = ["mcp-serve", "memory"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_code_intel]
command = "omx"
args = ["mcp-serve", "code-intel"]
enabled = true
startup_timeout_sec = 10

[mcp_servers.omx_trace]
command = "omx"
args = ["mcp-serve", "trace"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_wiki]
command = "omx"
args = ["mcp-serve", "wiki"]
enabled = true
startup_timeout_sec = 5

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit"]
terminal_title = ["activity", "project-name", "task-progress"]

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "CODEX_OPENROUTER_API_KEY"
env_key_instructions = "Set CODEX_OPENROUTER_API_KEY in ~/.profile (codex-scoped name)."
wire_api = "responses"

[model_providers.openrouter.http_headers]
"HTTP-Referer" = "https://github.com/openai/codex"
"X-Title" = "Codex CLI"

[model_providers.deepseek_direct]
name = "DeepSeek (direct via local proxy)"
base_url = "http://127.0.0.1:5000/v1"
wire_api = "responses"

[profiles.deepseek-v4-pro]
model = "deepseek-v4-pro"
model_provider = "deepseek_direct"
model_reasoning_effort = "xhigh"

[profiles.deepseek-v4-flash]
model = "deepseek-v4-flash"
model_provider = "deepseek_direct"
model_reasoning_effort = "xhigh"
