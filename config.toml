model = "gpt-5.5"
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
developer_instructions = """
Also follow /home/streaming/.codex/CODEX.md as user-level guidance when it does not conflict with higher-priority Codex instructions.
Ported skills live in /home/streaming/.codex/skills; use matching skills for Go, Python, tests, debugging, UI, Android, porting, skill/prompt work, and explicit delegated-agent work.
"""

[features]
codex_hooks = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[projects."/"]
trust_level = "trusted"

[projects."/home/streaming/.codex"]
trust_level = "trusted"

[projects."/home/streaming/go/src/github.com/xaionaro-go/jni"]
trust_level = "trusted"

[projects."/home/streaming/go/src/github.com/xaionaro-go"]
trust_level = "trusted"

[projects."/home/streaming"]
trust_level = "trusted"

[projects."/home/streaming/go/src/github.com/xaionaro-go/avpipeline"]
trust_level = "trusted"

[projects."/home/streaming/go/src/github.com/xaionaro-go/avd"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4

[notice]
hide_rate_limit_model_nudge = true

[mcp_servers.omx_state]
command = "node"
args = ["/usr/lib/node_modules/oh-my-codex/dist/mcp/state-server.js"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_memory]
command = "node"
args = ["/usr/lib/node_modules/oh-my-codex/dist/mcp/memory-server.js"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_code_intel]
command = "node"
args = ["/usr/lib/node_modules/oh-my-codex/dist/mcp/code-intel-server.js"]
enabled = true
startup_timeout_sec = 10

[mcp_servers.omx_trace]
command = "node"
args = ["/usr/lib/node_modules/oh-my-codex/dist/mcp/trace-server.js"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_wiki]
command = "node"
args = ["/usr/lib/node_modules/oh-my-codex/dist/mcp/wiki-server.js"]
enabled = true
startup_timeout_sec = 5

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit"]
terminal_title = ["activity", "project-name", "task-progress"]

